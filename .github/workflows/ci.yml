name: mlops-ci

on:
  push:
    branches:
      - develop
      - feature/**

permissions:
  contents: read
  packages: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "::group::Install dependencies"
          pip install -r requirements.txt
          echo "::endgroup::"

      - name: Train model
        run: |
          echo "::group::Train model"
          python train.py
          echo "::endgroup::"

      - name: Job summary
        run: |
          {
            echo "## Training Job"
            echo "- Status: success"
            echo "- Python: 3.11"
            echo "- Trigger: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-build-and-push:
    if: github.ref == 'refs/heads/develop'
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Buildx setup
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mini-projet-mlops" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Job summary
        run: |
          {
            echo "## Docker Build & Push Job"
            echo "- Status: success"
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Tags:"
            echo "  - \`latest\`"
            echo "  - \`${GITHUB_SHA}\`"
            echo "- Trigger: \`${GITHUB_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"